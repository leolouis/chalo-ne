<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <!-- =========================================================================
         1. COMPLIANCE & GLOBAL CLIENT DEFINITION MATRIX
         ========================================================================= -->
    <meta charset="UTF-8" />
    <!-- Prevents mobile viewport zooming anomalies, locking the scale layout for a native app feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- =========================================================================
         2. CORE METADATA & GRAPHICAL SYNC MODULES (SEO / CORPORATE LINK SHARING)
         ========================================================================= -->
    <title>Chalo Ne! | High-Throughput Corporate Transit Mesh</title>
    <meta name="description" content="Venture-backed hyper-local carpooling platform connecting Western Ahmedabad hubs to GIFT City block zones. Features strict asynchronous domain lookups, real-time bypass alerts, and climate-adaptive pricing." />
    <meta name="theme-color" content="#020617" /> <!-- Matches slate-950 deep layout background -->

    <!-- Open Graph (OG) Node Hooks for Slack, Teams, and LinkedIn Enterprise Cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chalo Ne! Mobile Platform" />
    <meta property="og:title" content="Chalo Ne! — Automated GIFT City Transit Mesh" />
    <meta property="og:description" content="Bypass SG Highway traffic crawls with verified peer-to-peer corporate ride-sharing." />
    <meta property="og:image" content="https://unsplash.com" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Engine Card Integration Extensions -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chalo Ne! Corporate Transit Engine" />
    <meta name="twitter:description" content="Hyper-local carpooling network built for verified corporate employees." />

    <!-- =========================================================================
         3. NETWORK OPTIMIZATION & PRE-RENDER STRATEGIES
         ========================================================================= -->
    <!-- Warms up the connection to the Google Fonts server to reduce initial asset latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Ultra-premium corporate typography tracking: Plus Jakarta Sans for UI, JetBrains Mono for system metrics -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- =========================================================================
         4. INLINE CRITICAL STYLE LAYER (CRITICAL CSS)
         ========================================================================= -->
    <style>
      /* Declaring native CSS design tokens for fast pre-bundler rendering accessibility */
      :root {
        --color-slate-900: #0f172a;
        --color-slate-950: #020617;
        --color-emerald-400: #34d399;
        --color-emerald-500: #10b981;
      }

      /* Baseline element styling overrides to guard against flicker when rendering */
      html, body {
        background-color: var(--color-slate-950);
        margin: 0;
        padding: 0;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow-x: hidden;
        width: 100%;
        height: 100%;
      }

      /* Ultra Pro Max Cloud Loading Screen Shim Overlay */
      #app-preloader {
        position: fixed;
        inset: 0;
        background-color: var(--color-slate-950);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999999; /* Higher priority than all other layout elements */
        transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
      }

      /* Animated Telemetry Spinner Node */
      .mesh-spinner-container {
        position: relative;
        width: 64px;
        height: 64px;
      }

      .mesh-spinner {
        width: 100%;
        height: 100%;
        border: 3px solid rgba(52, 211, 153, 0.05);
        border-top-color: var(--color-emerald-400);
        border-bottom-color: var(--color-emerald-500);
        border-radius: 50%;
        animation: spin-clockwise 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      .mesh-spinner-inner {
        position: absolute;
        inset: 8px;
        border: 2px solid transparent;
        border-left-color: #3b82f6; /* Blue corporate balance accent */
        border-right-color: #6366f1;
        border-radius: 50%;
        animation: spin-counter-clockwise 0.6s linear infinite;
      }

      /* High-utility micro-animations for spatial loading layout fluidity */
      @keyframes spin-clockwise {
        to { transform: rotate(360deg); }
      }
      @keyframes spin-counter-clockwise {
        to { transform: rotate(-360deg); }
      }

      /* Telemetry loading label text animation properties */
      .telemetry-text {
        margin-top: 24px;
        font-size: 10px;
        font-weight: 700;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.2em;
        color: #64748b;
        text-transform: uppercase;
        animation: pulse-telemetry 1.5s ease-in-out infinite;
      }

      @keyframes pulse-telemetry {
        0%, 100% { opacity: 0.5; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  
  <body class="bg-slate-900 text-slate-100 antialiased selection:bg-emerald-500/20 selection:text-emerald-300">
    
    <!-- =========================================================================
         5. ASYNC INITIALIZATION MARKUP LAYER
         ========================================================================= -->
    <!-- Structural Preloader Shield preventing UI flash states while assets load -->
    <div id="app-preloader" role="status" aria-label="Loading Chalo Ne Application Container">
      <div class="mesh-spinner-container">
        <div class="mesh-spinner"></div>
        <div class="mesh-spinner-inner"></div>
      </div>
      <div class="telemetry-text">
        Initializing Transit Mesh Pipeline...
      </div>
    </div>

    <!-- =========================================================================
         6. CORE VIRTUAL DOM MOUNT ROOT NODE
         ========================================================================= -->
    <!-- The primary node where the React application tree will be injected by main.tsx -->
    <div id="root"></div>
    
    <!-- =========================================================================
         7. SYSTEM COMPONENT RUNTIME LIFECYCLE SCRIPTS
         ========================================================================= -->
    <script>
      /**
       * Fades out and cleanly terminates the preloader overlay element 
       * once the client DOM tree has fully parsed and readied.
       */
      window.addEventListener('DOMContentLoaded', () => {
        const preloader = document.getElementById('app-preloader');
        if (preloader) {
          // Micro timeout to allow initial GPU rendering to finish smoothly
          setTimeout(() => {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            
            // Garbage collection: removes the DOM node entirely 400ms after the fade animation completes
            setTimeout(() => {
              preloader.remove();
            }, 400);
          }, 250);
        }
      });

      /**
       * Global crash security capture hook to intercept unhandled asynchronous script anomalies
       */
      window.addEventListener('unhandledrejection', (event) => {
        console.error('📊 Core Transit Mesh intercepted unhandled network promise rejection:', event.reason);
      });
    </script>

    <!-- Master client compilation route module connecting directly to our TypeScript compiler -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
